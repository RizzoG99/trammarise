<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Trammarise Onboarding - Step 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#067ff9",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .dot-grid {
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(6, 127, 249, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }
        .glass-card.active {
            background: rgba(6, 127, 249, 0.08);
            border-color: #067ff9;
            box-shadow: 0 0 20px rgba(6, 127, 249, 0.15);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display selection:bg-primary/30">
<!-- Background Texture -->
<div class="fixed inset-0 dot-grid pointer-events-none z-0"></div>
<!-- Header -->
<header class="relative z-10 w-full py-8 px-6 flex justify-center items-center">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">graphic_eq</span>
</div>
<span class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white uppercase">Trammarise</span>
</div>
</header>
<!-- Progress Section -->
<div class="relative z-10 w-full max-w-4xl mx-auto px-6 mb-12">
<div class="flex flex-col items-center gap-4">
<div class="flex items-center gap-3">
<div class="w-12 h-2 rounded-full bg-primary"></div>
<div class="w-12 h-2 rounded-full border border-slate-700"></div>
<div class="w-12 h-2 rounded-full border border-slate-700"></div>
</div>
<div class="flex items-center gap-4 w-full max-w-xs">
<div class="flex-1 h-1 bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/3"></div>
</div>
<span class="text-xs font-medium text-primary tracking-wider uppercase">Step 1 of 3 (33%)</span>
</div>
</div>
</div>
<!-- Main Content -->
<main class="relative z-10 flex-1 w-full max-w-4xl mx-auto px-6 pb-24">
<div class="text-center mb-12">
<span class="text-primary font-medium tracking-widest uppercase text-xs mb-2 block">Welcome to Trammarise</span>
<h1 class="text-4xl md:text-5xl font-bold text-slate-900 dark:text-white mb-4">What will you transcribe?</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg max-w-xl mx-auto">Select your primary use case to help us tailor your experience.</p>
</div>
<!-- Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
<!-- Card 1: Meeting (Active) -->
<button class="glass-card active p-6 rounded-2xl flex flex-col items-start text-left relative group">
<div class="absolute top-4 right-4 bg-primary text-white rounded-full p-0.5 flex items-center justify-center">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<div class="w-12 h-12 bg-primary/20 rounded-xl flex items-center justify-center mb-4 text-primary">
<span class="material-symbols-outlined text-3xl">groups</span>
</div>
<h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white">Meeting</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">Team standups, client calls, and board meetings.</p>
</button>
<!-- Card 2: Lecture -->
<button class="glass-card p-6 rounded-2xl flex flex-col items-start text-left group">
<div class="w-12 h-12 bg-slate-800/50 rounded-xl flex items-center justify-center mb-4 text-slate-400 group-hover:text-primary group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-3xl">school</span>
</div>
<h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white">Lecture</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">University classes, seminars, and educational workshops.</p>
</button>
<!-- Card 3: Interview -->
<button class="glass-card p-6 rounded-2xl flex flex-col items-start text-left group">
<div class="w-12 h-12 bg-slate-800/50 rounded-xl flex items-center justify-center mb-4 text-slate-400 group-hover:text-primary group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-3xl">record_voice_over</span>
</div>
<h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white">Interview</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">Journalism, HR recruitment, and research studies.</p>
</button>
<!-- Card 4: Podcast -->
<button class="glass-card p-6 rounded-2xl flex flex-col items-start text-left group">
<div class="w-12 h-12 bg-slate-800/50 rounded-xl flex items-center justify-center mb-4 text-slate-400 group-hover:text-primary group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-3xl">podcasts</span>
</div>
<h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white">Podcast</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">Content creation, subtitles, and social media clips.</p>
</button>
<!-- Card 5: Voice Memo -->
<button class="glass-card p-6 rounded-2xl flex flex-col items-start text-left group">
<div class="w-12 h-12 bg-slate-800/50 rounded-xl flex items-center justify-center mb-4 text-slate-400 group-hover:text-primary group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-3xl">mic</span>
</div>
<h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white">Voice Memo</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">Personal notes, reminders, and creative thoughts.</p>
</button>
<!-- Card 6: Other -->
<button class="glass-card p-6 rounded-2xl flex flex-col items-start text-left group">
<div class="w-12 h-12 bg-slate-800/50 rounded-xl flex items-center justify-center mb-4 text-slate-400 group-hover:text-primary group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-3xl">more_horiz</span>
</div>
<h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white">Other</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">Anything else you need to turn into text.</p>
</button>
</div>
</main>
<!-- Footer -->
<footer class="fixed bottom-0 left-0 right-0 bg-background-dark/80 backdrop-blur-xl border-t border-slate-800/50 px-8 py-6 z-20">
<div class="max-w-4xl mx-auto flex items-center justify-between">
<button class="text-slate-500 hover:text-white transition-colors font-medium">
                Skip setup
            </button>
<button class="bg-primary hover:bg-primary/90 text-white px-10 py-3.5 rounded-xl font-bold text-lg flex items-center gap-2 transition-all active:scale-[0.98]">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
