<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Trammarise Mobile Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                        "slate-glass": "rgba(30, 41, 59, 0.7)",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .waveform-bar {
            width: 3px;
            background-color: #256af4;
            border-radius: 99px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
<!-- Mobile Container (Simulating 390px Viewport) -->
<div class="w-full max-w-[390px] min-h-screen bg-background-light dark:bg-background-dark flex flex-col relative shadow-2xl overflow-hidden">
<!-- Sticky Header -->
<header class="sticky top-0 z-50 glass-effect bg-white/70 dark:bg-slate-glass px-4 py-3 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="waves">waves</span>
<h1 class="font-bold text-lg tracking-tight">Trammarise</h1>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-1 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
<div class="w-8 h-8 rounded-full overflow-hidden border border-primary/30">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="A small circular professional user avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_6_7lIorVzreQa-KPenWxnsQw4MkWCO_TJILVKGsaMypQ7HetvcVjiyGe5ppRSNgUO8iMVj88ZNTcFeWKo01txe5y82Z_tZPhzaC3MEqFEFoSJvPpzX18eZ_e5h8u-iuOHuKk7GrG0tT3kdkMHxYe5SgvpTbl-BO24Ei1Q-aZC31CQvCABVzky8imb8asI-o3D97utyIGjz_jKDySvJADYbi_MN09rWrP5Dq6eJXbpeWbfsVRIz7Py2XdISKcRRPyX7nOKuLstCgs"/>
</div>
</div>
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 overflow-y-auto px-4 pt-6 pb-32 space-y-8">
<!-- Upload Zone -->
<section>
<div class="w-full h-[180px] rounded-xl border-2 border-dashed border-primary/40 bg-white/50 dark:bg-slate-900/40 flex flex-col items-center justify-center gap-3 glass-effect cursor-pointer active:scale-[0.98] transition-transform">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="cloud_upload">cloud_upload</span>
</div>
<div class="text-center">
<p class="font-bold text-lg">Tap to upload audio file</p>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Supports MP3, WAV, M4A up to 50MB</p>
</div>
</div>
</section>
<!-- OR Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800"></div>
<span class="text-xs font-bold text-slate-400 tracking-widest">OR</span>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800"></div>
</div>
<!-- Record Interface -->
<section class="flex flex-col items-center gap-6">
<div class="relative group">
<!-- Glow effect -->
<div class="absolute inset-0 bg-primary/30 blur-2xl rounded-full scale-125"></div>
<!-- Record Button -->
<button class="relative w-[72px] h-[72px] bg-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/40 hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-white text-4xl fill-1" data-icon="mic">mic</span>
</button>
</div>
<div class="text-center space-y-2">
<h3 class="text-xl font-bold">Tap to Record</h3>
<p class="text-sm font-medium text-slate-500 dark:text-slate-400">00:00</p>
</div>
<!-- Flat Waveform Bars -->
<div class="flex items-center justify-center gap-[4px] h-10 w-full px-8">
<div class="waveform-bar h-2"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-6"></div>
<div class="waveform-bar h-8"></div>
<div class="waveform-bar h-5"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-7"></div>
<div class="waveform-bar h-9"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-6"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-5"></div>
</div>
</section>
<!-- Config Accordion -->
<section>
<div class="rounded-xl glass-effect bg-white/50 dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800 overflow-hidden">
<button class="w-full px-4 py-4 flex items-center justify-between">
<div class="flex flex-col items-start gap-1">
<span class="text-sm font-bold">Processing Options</span>
<div class="flex flex-wrap gap-2 mt-1">
<span class="text-[10px] px-2 py-0.5 rounded bg-primary/20 text-primary border border-primary/20 font-medium">Auto-Detect</span>
<span class="text-[10px] px-2 py-0.5 rounded bg-primary/20 text-primary border border-primary/20 font-medium">Meeting</span>
<span class="text-[10px] px-2 py-0.5 rounded bg-primary/20 text-primary border border-primary/20 font-medium">AI Summary On</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-400" data-icon="expand_more">expand_more</span>
</button>
</div>
</section>
</main>
<!-- Sticky Bottom Bar -->
<footer class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[390px] glass-effect bg-white/80 dark:bg-slate-glass/90 border-t border-slate-200 dark:border-slate-800 px-4 pt-4 pb-8">
<button class="w-full h-14 bg-primary text-white font-bold text-lg rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
<span>Process Audio</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- IOS Safe Area Indicator (Visual only) -->
<div class="mt-4 flex justify-center">
<div class="w-32 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full opacity-50"></div>
</div>
</footer>
<!-- Bottom Navigation Icons Overlay (Matching Component Style) -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[390px] hidden">
<!-- This section is redundant given the request's footer specification but kept for layout reference -->
</nav>
</div>
</body></html>
